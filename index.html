<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>河北工程技术学院 GPA 智能计算器</title>
    <link rel="icon" href="favicon.png" type="image/png">
<style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.45);
            --glass-border: rgba(255, 255, 255, 0.4);
            --glass-text: #1e293b;
            --glass-muted: #64748b;
            --neon-gradient: linear-gradient(135deg, #2563eb 0%, #3b82f6 100%);
        }
               body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            /* 融入蓝色调的流动背景 */
            background: radial-gradient(at 10% 20%, rgba(219, 234, 254, 0.45) 0, transparent 70%),
                        radial-gradient(at 90% 10%, rgba(243, 232, 255, 0.4) 0, transparent 60%),
                        radial-gradient(at 80% 80%, rgba(224, 242, 254, 0.5) 0, transparent 80%),
                        #f8fafc;
            background-attachment: fixed;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            box-sizing: border-box;
            /* 蓝色调流动效果 */
            animation: blueFlow 12s ease-in-out infinite;
        }

        @keyframes blueFlow {
            0% { 
                background-position: 0% 0%, 100% 0%, 100% 100%;
                background-color: #f8fafc;
            }
            25% { 
                background-position: 25% 25%, 125% 25%, 125% 125%;
                background-color: #e6f4ff; /* 微妙的蓝色调 */
            }
            50% { 
                background-position: 50% 50%, 150% 50%, 150% 150%;
                background-color: #d1e9ff; /* 更明显的蓝色调 */
            }
            75% { 
                background-position: 25% 25%, 125% 25%, 125% 125%;
                background-color: #e6f4ff;
            }
            100% { 
                background-position: 0% 0%, 100% 0%, 100% 100%;
                background-color: #f8fafc;
            }
        }

        .app-container {
            width: 100%;
            max-width: 1150px;
            position: relative;
            z-index: 10;
        }

        /* 标题布局区 */
        .mimic-header {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            margin-bottom: 50px;
            position: relative;
        }

        /* 左上角图标 */
        .mimic-top-bar {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 32px;
            color: #64748b;
        }

        .mimic-icon-btn {
            color: #64748b;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.2s, transform 0.2s;
            cursor: pointer;
            text-decoration: none;
        }

        .mimic-icon-btn:hover {
            color: #1e293b;
            transform: scale(1.05);
        }

        .mimic-title-group {
            text-align: left;
        }

        .mimic-main-title {
            font-size: 28px;
            font-weight: 700;
            color: #1e293b;
            margin: 0;
            letter-spacing: 1px;
            line-height: 1.3;
        }

        .mimic-sub-title {
            font-size: 26px;
            font-weight: 700;
            color: #1e293b;
            margin: 4px 0 0 0;
            letter-spacing: 1px;
            line-height: 1.3;
        }

        /* 核心功能布局 */
        .app-grid {
            display: grid;
            grid-template-columns: 310px 1fr;
            gap: 28px;
            align-items: start;
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(30px) saturate(140%);
            -webkit-backdrop-filter: blur(30px) saturate(140%);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.03),
                        inset 0 1px 0 0 rgba(255, 255, 255, 0.25);
            padding: 24px;
            box-sizing: border-box;
        }

        .card-title {
            font-size: 15px;
            font-weight: 700;
            color: #0f172a;
            margin-top: 0;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* 下拉选择区 */
        .config-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 20px;
        }

        .config-group label {
            font-size: 12px;
            font-weight: 700;
            color: #475569;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

select {
    width: 100%;
    padding: 12px 16px 12px 14px;
    border: 1px solid rgba(15, 23, 42, 0.12);
    border-radius: 12px;
    font-size: 14px;
    background: rgba(255, 255, 255, 0.6);
    color: var(--glass-text);
    outline: none;
    cursor: pointer;
    transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    appearance: none;
    background-image: url("data:image/svg+xml;charset=utf8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%2364748b' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpolyline points='6 9 12 15 18 9'%3E%3C/polyline%3E%3C/svg%3E");
    background-repeat: no-repeat;
    background-position: right 12px center;
    background-size: 16px;
    padding-right: 40px;
    position: relative;
    /* 添加更流畅的阴影过渡 */
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.03);
}

select:focus {
    border-color: #2563eb;
    background: #ffffff;
    box-shadow: 0 4px 16px rgba(37, 99, 235, 0.15);
    transform: translateY(-1px);
    transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
}

select:hover {
    border-color: rgba(15, 23, 42, 0.18);
    background: rgba(255, 255, 255, 0.7);
    box-shadow: 0 2px 12px rgba(0, 0, 0, 0.04);
    transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
}

/* 移除脉冲动画，改用更自然的过渡 */
select:focus:not(:hover) {
    transform: translateY(-1px);
}

/* 优化选项样式 */
select option {
    background: #ffffff;
    color: #1e293b;
    padding: 10px 14px;
}

/* 针对不同浏览器的兼容性 */
select::-ms-expand {
    display: none;
}

/* 添加微光效果 */
select::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    border-radius: 12px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.3s ease;
    background: linear-gradient(45deg, transparent, rgba(255, 255, 255, 0.2), transparent);
}

select:focus::before {
    opacity: 1;
}

select:focus {
    animation: selectPulse 2s ease-in-out infinite;
}

        .btn-glass-submit {
            width: 100%;
            background: #2563eb;
            color: white;
            border: none;
            padding: 13px;
            border-radius: 10px;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.15);
            transition: all 0.2s;
            margin-top: 12px;
        }

        .btn-glass-submit:hover {
            background: #1d4ed8;
            transform: translateY(-1px);
        }

        /* 右侧控制面板 */
        .right-panel {
            display: flex;
            flex-direction: column;
            gap: 28px;
        }

        /* 看板卡片区 */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 18px;
        }

        .stat-card {
            background: var(--glass-bg);
            backdrop-filter: blur(30px) saturate(140%);
            -webkit-backdrop-filter: blur(30px) saturate(140%);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 22px 24px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 135px;
        }

        .stat-card-neon {
            background: var(--neon-gradient);
            border: none;
            color: #ffffff;
            box-shadow: 0 12px 24px rgba(37, 99, 235, 0.15), 
                        inset 0 1px 1px 0 rgba(255, 255, 255, 0.25);
        }

        .stat-label {
            font-size: 13px;
            font-weight: 600;
            color: var(--glass-muted);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .stat-card-neon .stat-label { color: rgba(255, 255, 255, 0.85); }

        .stat-value {
            font-size: 40px;
            font-weight: 800;
            color: #0f172a;
            line-height: 1;
            margin: 14px 0 6px 0;
        }

        .stat-card-neon .stat-value { color: #ffffff; }

        .stat-sub {
            font-size: 12px;
            color: var(--glass-muted);
            font-weight: 500;
        }

        .stat-card-neon .stat-sub { color: rgba(255, 255, 255, 0.75); }

        /* 课程明细：翻页/滚动高强度毛玻璃 */
        .detail-card {
            padding: 24px 0 0 0;
            overflow: hidden;
        }

        .detail-header {
            padding: 0 24px 18px 24px;
            border-bottom: 1px solid rgba(15, 23, 42, 0.05);
            margin: 0;
        }

        .table-container {
            max-height: 400px;
            overflow-y: auto;
            position: relative;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(25px) saturate(160%);
            -webkit-backdrop-filter: blur(25px) saturate(160%);
            color: #334155;
            font-weight: 700;
            font-size: 12.5px;
            padding: 16px 24px;
            border-bottom: 1px solid rgba(15, 23, 42, 0.06);
            position: sticky;
            top: 0;
            z-index: 20;
        }

        td {
            padding: 15px 24px;
            border-bottom: 1px solid rgba(15, 23, 42, 0.02);
            font-size: 14px;
        }

        tr:hover td {
            background: rgba(255, 255, 255, 0.25);
        }

        .course-name-field {
            font-weight: 600;
            color: #1e293b;
        }

        .credit-tag {
            background: rgba(15, 23, 42, 0.04);
            color: #334155;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 700;
            display: inline-block;
        }

        .score-input {
            width: 110px;
            padding: 8px 12px;
            border: 1px solid rgba(15, 23, 42, 0.12);
            border-radius: 8px;
            font-size: 14px;
            font-weight: 700;
            color: #0f172a;
            box-sizing: border-box;
            background: rgba(255, 255, 255, 0.6);
            transition: all 0.2s;
        }

        .score-input:focus {
            outline: none;
            border-color: #2563eb;
            background: #ffffff;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 90px 24px;
            color: var(--glass-muted);
            text-align: center;
        }

        .empty-icon {
            color: rgba(15, 23, 42, 0.12);
            margin-bottom: 14px;
        }

        .footer-declaration {
            text-align: center;
            margin-top: 60px;
            font-size: 12px;
            color: #94a3b8;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(0, 0, 0, 0.06); border-radius: 10px; }

/* 移动端适配增强 */
/* 移动端适配增强 - 智能文本处理 */

@media (max-width: 768px) {
  /* 移动端课程明细优化 */
      @media (-webkit-min-device-pixel-ratio: 2), (min-resolution: 192dpi) {
        /* 高分辨率屏幕适配 */
        .table-container table {
            font-size: 100%;
        }
        
        th, td {
            padding: 1.2rem 1.6rem;
        }
        
        .score-input {
            padding: 1rem 1.2rem;
            font-size: 1rem;
        }
        
        .delete-btn-mobile {
            padding: 0.8rem 1.6rem;
            font-size: 1rem;
        }
    }
    
    /* 缩放适配 - 使用相对单位 */
    @media screen and (min-width: 320px) {
        .table-container {
            margin: 0 -0.75rem;
            padding: 0 0.75rem;
        }
        
        table {
            min-width: 30rem; /* 使用rem替代px */
        }
        
        th, td {
            padding: 0.75rem 1rem;
            font-size: 0.875rem; /* 14px */
        }
        
        .course-name-field {
            font-size: 0.875rem;
            line-height: 1.4;
        }
        
        .credit-tag {
            padding: 0.25rem 0.625rem;
            font-size: 0.75rem; /* 12px */
        }
        
        .score-input {
            padding: 0.625rem 0.75rem;
            font-size: 0.875rem;
        }
        
        .delete-btn-mobile {
            padding: 0.5rem 1rem;
            font-size: 0.875rem;
            min-width: 5rem;
        }
    }
    
    @media (max-width: 768px) {
        /* 表格优化 */
        
        .table-container {
            overflow-x: auto;
            margin: 0 -12px;
            padding: 0 12px;
        }
        
        table {
            width: 100%;
            min-width: 500px; /* 确保有足够宽度 */
        }
        
        th, td {
            padding: 12px 16px;
            font-size: 14px;
            line-height: 1.5;
        }
        
        /* 课程名称列 - 增加可读性 */
        .course-name-field {
            font-weight: 600;
            color: #1e293b;
            max-width: 200px;
            word-break: break-word;
            line-height: 1.4;
        }
        
        /* 学分列 - 优化显示 */
        .credit-tag {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 700;
        }
        
        /* 成绩输入列 - 增加高度 */
        .score-input {
            width: 100%;
            min-width: 100px;
            padding: 10px 12px;
            font-size: 14px;
            height: auto;
        }
        
        /* 操作列 - 增加空间 */
        td:last-child {
            min-width: 120px;
            padding-left: 8px;
        }
        
        .delete-btn-mobile {
            background: none;
            border: none;
            color: #ef4444;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            padding: 8px 16px;
            border-radius: 8px;
            background: rgba(239, 68, 68, 0.1);
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 80px;
        }
        
        .delete-btn-mobile:hover {
            background: rgba(239, 68, 68, 0.2);
            transform: scale(1.03);
        }
        
        /* 空状态优化 */
        .empty-state {
            padding: 60px 24px;
            text-align: center;
        }
        
        .empty-icon svg {
            width: 32px;
            height: 32px;
            margin-bottom: 12px;
        }
        
    .app-grid { 
        grid-template-columns: 1fr; 
        gap: 16px;
        padding: 0 16px;
    }
    
    /* 统计卡片调整 */
    .stats-row { 
        grid-template-columns: 1fr; 
        gap: 12px;
    }
    
    /* 表格优化 - 智能文本处理 */
    .table-container {
        overflow-x: auto;
        margin: 0 -16px;
        padding: 0 16px;
        max-width: 100vw;
        width: 100%;
    }
    
    table {
        width: 100%;
        min-width: auto;
        table-layout: fixed;
    }
    
    th, td {
        padding: 10px 12px;
        font-size: 13px;
        /* 智能文本处理 */
        white-space: normal; /* 允许换行 */
        word-break: break-word; /* 在单词内换行 */
        line-height: 1.4;
    }
    
    /* 课程名称列特殊处理 */
    .course-name-field {
        font-weight: 600;
        color: #1e293b;
        /* 防止过长文本影响布局 */
        max-width: 180px;
        overflow: hidden;
        text-overflow: ellipsis;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
    }
    
    /* 学分列优化 */
    .credit-tag {
        display: inline-block;
        white-space: nowrap;
        max-width: 60px;
        overflow: hidden;
        text-overflow: ellipsis;
    }
    
    /* 成绩输入列优化 */
    .score-input {
        width: 100%;
        max-width: 100px;
        min-width: 80px;
    }
    
    /* 操作列优化 */
    td:last-child {
        white-space: nowrap;
        min-width: 120px;
    }
    
    /* 标题调整 */
    .mimic-main-title {
        font-size: 24px;
    }
    
    .mimic-sub-title {
        font-size: 22px;
    }
    
    /* 输入框和按钮优化 */
    select, .score-input, .btn-glass-submit {
        font-size: 16px;
        padding: 12px 16px;
        width: 100%;
    }
    
    .btn-glass-submit {
        padding: 14px;
        font-size: 15px;
    }
    
    /* 手动添加课程区域 */
 .config-group input[type="text"],
    .config-group input[type="number"] {
        font-size: 16px;
        padding: 12px;
        width: 100%;
        box-sizing: border-box;
    }
    
    /* 手动添加课程的网格布局修复 */
    .manual-add-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 8px;
        margin-bottom: 8px;
    }
    
    .manual-add-grid input {
        width: 100%;
    }

    /* 防止内容溢出 */
    .glass-card {
        overflow: hidden;
    }
    
    .detail-card {
        overflow: hidden;
    }
    
    /* 移动端专用样式 */
    .mobile-only {
        display: block;
    }
    
    .desktop-only {
        display: none;
    }
}

/* 超小屏幕适配 */
   @media (max-width: 480px) {
        .table-container {
            margin: 0 calc(-1.5vw);
            padding: 0 1.5vw;
        }
        
        th, td {
            padding: 1vw 1.2vw;

        .course-name-field {

        .score-input {

        .delete-btn-mobile {
            padding: 0.375vw 0.75vw;
            font-size: clamp(11px, 0.8125rem, 13px);
            min-width: 4vw;
        }
    }

function loadTemplateEngine() {
    const major = document.getElementById('majorSelect').value;
    const semester = document.getElementById('semesterSelect').value;

    if (!major || !semester) {
        alert('请先选择修读专业和目标学期！');
        return;
    }

    const token = `${major}_${semester}`;
    const dataset = courseTemplates[token];

    if (!dataset) {
        alert('该专业或学期暂无预设课程数据（Token: ' + token + '）。');
        return;
    }

    const container = document.getElementById('tableContainer');
    // 确保创建表格的同时包含“操作”列
    let htmlBuffer = `
        <table>
            <thead>
                <tr>
                    <th>课程名称</th>
                    <th>学分</th>
                    <th>最终成绩</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody id="innerTbody">
    `;

    dataset.forEach((item) => {
        htmlBuffer += `
            <tr>
                <td class="course-name-field">${item.name}</td>
                <td><span class="credit-tag">${item.credit.toFixed(2)}</span></td>
                <td>
                    <input type="number" class="score-input" placeholder="0-100" min="0" max="100" step="0.1"

                        删除
                    </button>
                </td>
            </tr>
        `;
    });

    htmlBuffer += `</tbody></table>`;
    container.innerHTML = htmlBuffer;

    document.getElementById('boardCount').innerText = `总修读课程数：${dataset.length} 门`;
    resetStatsDashboard();
    
    const firstInput = container.querySelector('.score-input');
    if (firstInput) firstInput.focus();
}

    function resetStatsDashboard() {
        document.getElementById('boardGPA').innerText = '0';
        document.getElementById('boardAvg').innerText = '0';
        document.getElementById('boardCredits').innerText = '0';
        document.getElementById('boardCount').innerText = '总修读课程数：0 门';
    }

    // 新增的课程计数更新函数
    function updateCourseCount() {
        const tbody = document.getElementById('innerTbody');
        if (tbody) {
            const rowCount = tbody.querySelectorAll('tr').length;
            document.getElementById('boardCount').innerText = `总修读课程数：${rowCount} 门`;
        } else {
            // 如果没有tbody，检查整个表格
            const table = document.getElementById('tableContainer').querySelector('table');
            if (table) {
                const rows = table.querySelectorAll('tbody tr').length;
                document.getElementById('boardCount').innerText = `总修读课程数：${rows} 门`;
            } else {
                document.getElementById('boardCount').innerText = '总修读课程数：0 门';
            }
        }
    }

    function parseScoreToGPA(score) {
        if (score >= 90) return 4.0;
        if (score >= 85) return 3.7;
        if (score >= 82) return 3.3;
        if (score >= 78) return 3.0;
        if (score >= 75) return 2.7;
        if (score >= 71) return 2.3;
        if (score >= 67) return 2.0;
        if (score >= 63) return 1.5;
        if (score >= 60) return 1.0;
        return 0.0;
    }

    function coreCalcEngine() {
        const inputs = document.querySelectorAll('.score-input');
        let totalCredits = 0;
        let weightedScoreSum = 0;
        let weightedGPASum = 0;
        let activeCourseCount = 0;

        inputs.forEach(input => {
            const credit = parseFloat(input.getAttribute('data-credit'));
            const score = parseFloat(input.value);

            if (!isNaN(score) && score >= 0 && score <= 100) {
                activeCourseCount++;
                if (credit > 0) {
                    totalCredits += credit;
                    weightedScoreSum += (score * credit);
                    weightedGPASum += (parseScoreToGPA(score) * credit);
                }
            }
        });

        if (activeCourseCount > 0 && totalCredits > 0) {
            document.getElementById('boardCredits').innerText = totalCredits.toFixed(2);
            document.getElementById('boardAvg').innerText = (weightedScoreSum / totalCredits).toFixed(2);
            document.getElementById('boardGPA').innerText = (weightedGPASum / totalCredits).toFixed(2);
        } else {
            resetStatsDashboard();
        }
        
        // 更新课程计数
        updateCourseCount();
    }
