<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>河北工程技术学院 GPA 智能计算器</title>
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.45);
            --glass-border: rgba(255, 255, 255, 0.4);
            --glass-text: #1e293b;
            --glass-muted: #64748b;
            --neon-gradient: linear-gradient(135deg, #2563eb 0%, #3b82f6 100%);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: radial-gradient(at 10% 20%, rgba(219, 234, 254, 0.45) 0, transparent 70%),
                        radial-gradient(at 90% 10%, rgba(243, 232, 255, 0.4) 0, transparent 60%),
                        radial-gradient(at 80% 80%, rgba(224, 242, 254, 0.5) 0, transparent 80%),
                        #f8fafc;
            background-attachment: fixed;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .app-container {
            width: 100%;
            max-width: 1150px;
            position: relative;
            z-index: 10;
        }

        /* 标题布局区 */
        .mimic-header {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            margin-bottom: 50px;
            position: relative;
        }

        /* 左上角图标 */
        .mimic-top-bar {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 32px;
            color: #64748b;
        }

        .mimic-icon-btn {
            color: #64748b;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.2s, transform 0.2s;
            cursor: pointer;
            text-decoration: none;
        }

        .mimic-icon-btn:hover {
            color: #1e293b;
            transform: scale(1.05);
        }

        .mimic-title-group {
            text-align: left;
        }

        .mimic-main-title {
            font-size: 28px;
            font-weight: 700;
            color: #1e293b;
            margin: 0;
            letter-spacing: 1px;
            line-height: 1.3;
        }

        .mimic-sub-title {
            font-size: 26px;
            font-weight: 700;
            color: #1e293b;
            margin: 4px 0 0 0;
            letter-spacing: 1px;
            line-height: 1.3;
        }

        /* 核心功能布局 */
        .app-grid {
            display: grid;
            grid-template-columns: 310px 1fr;
            gap: 28px;
            align-items: start;
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(30px) saturate(140%);
            -webkit-backdrop-filter: blur(30px) saturate(140%);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.03),
                        inset 0 1px 0 0 rgba(255, 255, 255, 0.25);
            padding: 24px;
            box-sizing: border-box;
        }

        .card-title {
            font-size: 15px;
            font-weight: 700;
            color: #0f172a;
            margin-top: 0;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* 下拉选择区 */
        .config-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 20px;
        }

        .config-group label {
            font-size: 12px;
            font-weight: 700;
            color: #475569;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        select {
            width: 100%;
            padding: 11px 14px;
            border: 1px solid rgba(15, 23, 42, 0.1);
            border-radius: 10px;
            font-size: 14px;
            background: rgba(255, 255, 255, 0.5);
            color: var(--glass-text);
            outline: none;
            cursor: pointer;
            transition: all 0.25s;
        }

        select:focus {
            border-color: #2563eb;
            background: #ffffff;
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
        }

        .btn-glass-submit {
            width: 100%;
            background: #2563eb;
            color: white;
            border: none;
            padding: 13px;
            border-radius: 10px;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.15);
            transition: all 0.2s;
            margin-top: 12px;
        }

        .btn-glass-submit:hover {
            background: #1d4ed8;
            transform: translateY(-1px);
        }

        /* 右侧控制面板 */
        .right-panel {
            display: flex;
            flex-direction: column;
            gap: 28px;
        }

        /* 看板卡片区 */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 18px;
        }

        .stat-card {
            background: var(--glass-bg);
            backdrop-filter: blur(30px) saturate(140%);
            -webkit-backdrop-filter: blur(30px) saturate(140%);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 22px 24px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 135px;
        }

        .stat-card-neon {
            background: var(--neon-gradient);
            border: none;
            color: #ffffff;
            box-shadow: 0 12px 24px rgba(37, 99, 235, 0.15), 
                        inset 0 1px 1px 0 rgba(255, 255, 255, 0.25);
        }

        .stat-label {
            font-size: 13px;
            font-weight: 600;
            color: var(--glass-muted);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .stat-card-neon .stat-label { color: rgba(255, 255, 255, 0.85); }

        .stat-value {
            font-size: 40px;
            font-weight: 800;
            color: #0f172a;
            line-height: 1;
            margin: 14px 0 6px 0;
        }

        .stat-card-neon .stat-value { color: #ffffff; }

        .stat-sub {
            font-size: 12px;
            color: var(--glass-muted);
            font-weight: 500;
        }

        .stat-card-neon .stat-sub { color: rgba(255, 255, 255, 0.75); }

        /* 课程明细：翻页/滚动高强度毛玻璃 */
        .detail-card {
            padding: 24px 0 0 0;
            overflow: hidden;
        }

        .detail-header {
            padding: 0 24px 18px 24px;
            border-bottom: 1px solid rgba(15, 23, 42, 0.05);
            margin: 0;
        }

        .table-container {
            max-height: 400px;
            overflow-y: auto;
            position: relative;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(25px) saturate(160%);
            -webkit-backdrop-filter: blur(25px) saturate(160%);
            color: #334155;
            font-weight: 700;
            font-size: 12.5px;
            padding: 16px 24px;
            border-bottom: 1px solid rgba(15, 23, 42, 0.06);
            position: sticky;
            top: 0;
            z-index: 20;
        }

        td {
            padding: 15px 24px;
            border-bottom: 1px solid rgba(15, 23, 42, 0.02);
            font-size: 14px;
        }

        tr:hover td {
            background: rgba(255, 255, 255, 0.25);
        }

        .course-name-field {
            font-weight: 600;
            color: #1e293b;
        }

        .credit-tag {
            background: rgba(15, 23, 42, 0.04);
            color: #334155;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 700;
            display: inline-block;
        }

        .score-input {
            width: 110px;
            padding: 8px 12px;
            border: 1px solid rgba(15, 23, 42, 0.12);
            border-radius: 8px;
            font-size: 14px;
            font-weight: 700;
            color: #0f172a;
            box-sizing: border-box;
            background: rgba(255, 255, 255, 0.6);
            transition: all 0.2s;
        }

        .score-input:focus {
            outline: none;
            border-color: #2563eb;
            background: #ffffff;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 90px 24px;
            color: var(--glass-muted);
            text-align: center;
        }

        .empty-icon {
            color: rgba(15, 23, 42, 0.12);
            margin-bottom: 14px;
        }

        .footer-declaration {
            text-align: center;
            margin-top: 60px;
            font-size: 12px;
            color: #94a3b8;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(0, 0, 0, 0.06); border-radius: 10px; }

        @media (max-width: 900px) {
            .app-grid { grid-template-columns: 1fr; gap: 20px;}
            .stats-row { grid-template-columns: 1fr; gap: 14px;}
        }
    </style>
</head>

    function handleConfigChange() {
        const container = document.getElementById('tableContainer');
        if (!container.querySelector('.empty-state')) {
            container.innerHTML = `
                <div class="empty-state">
                    <div class="empty-icon">
                        <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>

                    <div>配置已变更，请重新加载课程。</div>
                </div>`;
            resetStatsDashboard();
        }
    }

            return;
        }

        const dataset = courseTemplates[token];

            return;
        }

                <thead>
                    <tr>
                        <th>课程名称</th>
                        <th>学分</th>
                        <th>最终成绩</th>
                    </tr>
                </thead>
                <tbody id="innerTbody">
        `;

        dataset.forEach((item, idx) => {
            htmlBuffer += `
                <tr>
                    <td class="course-name-field">${item.name}</td>
                    <td><span class="credit-tag">${item.credit.toFixed(2)}</span></td>
                    <td>
                        <input type="number" 
                               class="score-input" 
                               placeholder="0-100" 
                               min="0" 
                               max="100" 
                               step="0.1" 
                               oninput="coreCalcEngine()"
                               data-credit="${item.credit}">
                    </td>
                </tr>
            `;
        });

        htmlBuffer += `</tbody></table>`;
        container.innerHTML = htmlBuffer;

        document.getElementById('boardCount').innerText = `总修读课程数：${dataset.length} 门`;
        resetStatsDashboard();

        const firstInput = container.querySelector('.score-input');
        if (firstInput) firstInput.focus();
    }

    function resetStatsDashboard() {
        document.getElementById('boardGPA').innerText = '0';
        document.getElementById('boardAvg').innerText = '0';
        document.getElementById('boardCredits').innerText = '0';
    }

    function parseScoreToGPA(score) {
        if (score >= 90) return 4.0;
        if (score >= 85) return 3.7;
        if (score >= 82) return 3.3;
        if (score >= 78) return 3.0;
        if (score >= 75) return 2.7;
        if (score >= 71) return 2.3;
        if (score >= 67) return 2.0;
        if (score >= 63) return 1.5;
        if (score >= 60) return 1.0;
        return 0.0;
    }

    function coreCalcEngine() {
        const inputs = document.querySelectorAll('.score-input');
        let totalCredits = 0;
        let weightedScoreSum = 0;
        let weightedGPASum = 0;
        let activeCourseCount = 0;

        inputs.forEach(input => {
            const credit = parseFloat(input.getAttribute('data-credit'));
            const score = parseFloat(input.value);

            if (!isNaN(score) && score >= 0 && score <= 100) {
                activeCourseCount++;
                if (credit > 0) {
                    totalCredits += credit;
                    weightedScoreSum += (score * credit);
                    weightedGPASum += (parseScoreToGPA(score) * credit);
                }
            }
        });

        if (activeCourseCount > 0 && totalCredits > 0) {
            document.getElementById('boardCredits').innerText = totalCredits.toFixed(2);
            document.getElementById('boardAvg').innerText = (weightedScoreSum / totalCredits).toFixed(2);
            document.getElementById('boardGPA').innerText = (weightedGPASum / totalCredits).toFixed(2);
        } else {
            resetStatsDashboard();
        }
    }
</script>
</body>
</html>
